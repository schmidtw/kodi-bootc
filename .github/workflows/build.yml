name: build

# Builds the Kodi bootc image and pushes it to GitHub Container Registry.
# The daily schedule is what keeps the box current: every night it rebuilds on
# top of the latest fedora-bootc base, so security/codec/kernel fixes flow out
# without you touching the machine.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch:

env:
  IMAGE_NAME: kodi-bootc

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: latest ${{ github.sha }}
          containerfiles: ./Containerfile
          oci: true

      - name: Push to ghcr.io
        uses: redhat-actions/push-to-registry@v1
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: latest ${{ github.sha }}
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
