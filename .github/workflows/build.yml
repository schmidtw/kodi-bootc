name: build

# Builds the Kodi bootc image and pushes it to GitHub Container Registry.
# The daily schedule is what keeps the box current: every night it rebuilds on
# top of the latest fedora-bootc base, so security/codec/kernel fixes flow out
# without you touching the machine.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/kodi-bootc
    steps:
      - uses: actions/checkout@v4

      # podman + buildah are preinstalled on ubuntu runners; using them directly
      # avoids the deprecated redhat-actions wrappers. FEDORA_VERSION comes from
      # the Containerfile's ARG default, so there's a single source of truth.
      - name: Build image
        run: podman build -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA}" .

      - name: Log in to ghcr.io
        run: podman login ghcr.io -u "${{ github.actor }}" --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Push
        run: |
          podman push "$IMAGE:latest"
          podman push "$IMAGE:${GITHUB_SHA}"
