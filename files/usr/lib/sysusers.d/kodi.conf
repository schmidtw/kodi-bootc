# Dedicated unprivileged account that runs Kodi.
# Created at boot (the bootc-idiomatic way), so it survives image updates.
#
# NOTE: supplementary group membership is NOT done here. On Fedora bootc the
# video/render/input/audio/tty groups live only in /usr/lib/group (nss-altfiles)
# and sysusers `m` lines (like usermod -aG) silently fail to add membership to
# them. We instead append layered /etc/group entries at build time (see the
# Containerfile), which nss-altfiles merges.
u kodi - "Kodi HTPC" /var/lib/kodi /usr/sbin/nologin
